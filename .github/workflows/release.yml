name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          export VERSION
          python3 - <<'PYEOF'
          import re, os, sys
          version = os.environ["VERSION"]
          with open("CHANGELOG.md") as f:
              content = f.read()
          pattern = r"## \[" + re.escape(version) + r"\][^\n]*\n(.*?)(?=\n---|\n## \[|\Z)"
          m = re.search(pattern, content, re.DOTALL)
          if not m:
              print(f"Version {version} not found in CHANGELOG.md", file=sys.stderr)
              sys.exit(1)
          notes = m.group(1).strip()
          mac_note = """
---

### macOS installation note

macOS will block the app on first launch because the builds are unsigned.

**Option 1 — right-click workaround (no Terminal needed)**
Right-click (or Control-click) the app → **Open** → click **Open** in the dialog.

**Option 2 — remove the quarantine flag**
```
xattr -rd com.apple.quarantine "/Applications/WoW Settings Backup.app"
```

**Option 3 — System Settings**
System Settings → Privacy & Security → scroll to the blocked-app notice → **Open Anyway**.
"""
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write("notes<<EOF_NOTES\n")
              out.write(notes + mac_note + "\n")
              out.write("EOF_NOTES\n")
          PYEOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: --mac
          - os: windows-latest
            platform: --win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package and publish
        run: npx electron-builder ${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
